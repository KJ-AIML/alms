name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        
    - name: Set up Python
      run: uv python install 3.13
      
    - name: Install dependencies
      run: uv sync
      
    - name: Lint (ruff)
      run: uv run ruff check src

    - name: Run unit tests
      run: |
        export PYTHONPATH=.
        uv run pytest src/tests/v1

    # DATABASE_ENABLED=False here because CI has no Postgres service --
    # these suites only exercise app plumbing (routing, observability,
    # error handling), not DB behavior. Add a postgres service container
    # if DB-specific e2e/integration coverage is needed later.
    - name: Run e2e/integration tests
      run: |
        export PYTHONPATH=.
        export DATABASE_ENABLED=False
        uv run pytest src/tests/e2e src/tests/integration
